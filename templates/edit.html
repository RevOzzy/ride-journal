<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Journal — {{ filename }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #eee;
      min-height: 100vh;
    }
    header {
      background: #111;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid #333;
    }
    header .logo { font-size: 1.4rem; }
    header h1 { font-size: 1rem; font-weight: 600; color: #E8521A; }
    header .sub { font-size: 0.8rem; color: #888; margin-top: 0.1rem; }
    .container { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem; }
    .hint {
      background: #242424;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    textarea {
      width: 100%;
      min-height: 520px;
      background: #242424;
      border: 1px solid #444;
      border-radius: 8px;
      color: #eee;
      font-family: Georgia, serif;
      font-size: 1rem;
      line-height: 1.75;
      padding: 1.25rem;
      resize: vertical;
    }
    textarea:focus { outline: none; border-color: #E8521A; }
    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }
    .btn-save {
      padding: 0.75rem 2rem;
      background: #E8521A;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save:hover { background: #d4481a; }
    .btn-preview {
      padding: 0.75rem 1.5rem;
      background: #333;
      color: #eee;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-preview:hover { background: #444; }
    .btn-back {
      padding: 0.75rem 1.5rem;
      background: transparent;
      color: #888;
      border: 1px solid #444;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-back:hover { color: #eee; border-color: #888; }
    .char-count { font-size: 0.8rem; color: #666; margin-top: 0.5rem; }
  </style>
</head>
<body>
<header>
  <div class="logo">🏍</div>
  <div>
    <h1>Edit Narrative</h1>
    <div class="sub">{{ filename }}</div>
  </div>
</header>

<div class="container">
  <div class="hint">
    Write each paragraph separated by a blank line. Plain text only — no HTML needed.
    Save to update the journal, then open it to see the result.
  </div>

  <form method="post" action="/save/{{ filename }}">
    <textarea name="narrative" id="narrative" spellcheck="true">{{ text }}</textarea>
    <div class="char-count" id="char-count"></div>
    <div class="actions">
      <button type="submit" class="btn-save">Save & View Journal</button>
      <a href="/download/{{ filename }}" target="_blank" class="btn-preview">Preview →</a>
      <a href="/" class="btn-back">← Back</a>
    </div>
  </form>
</div>

<script>
  const ta = document.getElementById("narrative");
  const cc = document.getElementById("char-count");
  function updateCount() {
    const words = ta.value.trim().split(/\s+/).filter(Boolean).length;
    cc.textContent = `${words} words`;
  }
  ta.addEventListener("input", updateCount);
  updateCount();
</script>
</body>
</html>
