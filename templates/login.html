<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ride Journal — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #242424;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 0.25rem;
      color: #E8521A;
    }
    p.sub { color: #888; font-size: 0.9rem; margin-bottom: 1.75rem; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.3rem; }
    input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #eee;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #E8521A; }
    button {
      width: 100%;
      padding: 0.7rem;
      background: #E8521A;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #d4481a; }
    .error {
      background: #3a1a1a;
      border: 1px solid #7a2020;
      color: #f88;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ride Journal</h1>
    <p class="sub">Sign in to continue</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
